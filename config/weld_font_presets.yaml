# 焊接骨架字 — Arial / Consolas（Win / Linux / macOS）
# 修改字体：编辑各 preset 的 paths（系统字体路径）；无项目内 fonts 目录约定

default_preset_id: arial

presets:
  - id: arial
    family: Arial
    label:
      zh: "Arial TTF 骨架 [Beta]"
      en: "Arial TTF skeleton [Beta]"
    skeleton:
      raster_close_px: 0
      raster_dilate_px: 0
      merge_gap_mm: 0.35
      spur_min_mm: 0.3
      branch_cluster_radius_px: 5
    paths:
      win32: "${WINDIR}/Fonts/arial.ttf"
      linux:
        - "/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf"
        - "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"
      darwin: "/System/Library/Fonts/Supplemental/Arial.ttf"

  - id: consolas
    family: Consolas
    label:
      zh: "Consolas TTF 骨架 [Beta]"
      en: "Consolas TTF skeleton [Beta]"
    skeleton:
      raster_close_px: 0
      raster_dilate_px: 0
      merge_gap_mm: 0.35
      spur_min_mm: 0.3
      branch_cluster_radius_px: 5
    paths:
      win32: "${WINDIR}/Fonts/consola.ttf"
      linux:
        - "/usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf"
        - "/usr/share/fonts/truetype/liberation/LiberationMono-Regular.ttf"
      darwin: "/System/Library/Fonts/Supplemental/Consolas.ttf"
